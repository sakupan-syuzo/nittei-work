<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>イベント日程調整</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>イベント日程調整</h1>
        </header>

        <main>
            <!-- イベント一覧表示 -->
            <section id="event-list-section">
                <h2>イベント一覧</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button id="create-event-btn" class="btn btn-primary">新規イベント作成</button>
                    <button id="admin-btn" class="btn btn-secondary">管理</button>
                </div>
                <div id="event-list" class="event-list"></div>
            </section>

            <!-- イベント作成フォーム -->
            <section id="create-event-section" class="hidden">
                <h2>新規イベント作成</h2>
                <form id="create-event-form">
                    <div class="form-group">
                        <label for="event-title">イベント名 <span class="required">*</span></label>
                        <input type="text" id="event-title" required>
                    </div>
                    <div class="form-group">
                        <label for="event-description">説明</label>
                        <textarea id="event-description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>日程候補 <span class="required">*</span></label>
                        <div id="date-candidates">
                            <div class="date-candidate">
                                <input type="datetime-local" required>
                                <button type="button" class="btn-remove" onclick="removeDateCandidate(this)">削除</button>
                            </div>
                        </div>
                        <button type="button" id="add-date-btn" class="btn btn-secondary">日程を追加</button>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">作成</button>
                        <button type="button" id="cancel-create-btn" class="btn btn-secondary">キャンセル</button>
                    </div>
                </form>
            </section>

            <!-- イベント詳細表示 -->
            <section id="event-detail-section" class="hidden">
                <div id="event-detail"></div>

                <h3>出欠回答</h3>
                <form id="response-form">
                    <div class="form-group">
                        <label for="participant-name">お名前 <span class="required">*</span></label>
                        <input type="text" id="participant-name" required>
                    </div>
                    <div id="availability-options" class="availability-options"></div>
                    <div class="form-group">
                        <label for="participant-comment">コメント・提案</label>
                        <textarea id="participant-comment" rows="3" placeholder="ご意見や別の日程提案などをご記入ください"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">回答を送信</button>
                </form>

                <h3>回答状況</h3>
                <div id="responses-summary"></div>
            </section>

            <!-- 管理画面 -->
            <section id="admin-section" class="hidden">
                <h2>イベント管理</h2>
                <button id="back-to-list-from-admin-btn" class="btn btn-secondary">一覧に戻る</button>
                <div id="admin-event-list" class="admin-event-list"></div>
            </section>

            <!-- イベント編集フォーム -->
            <section id="edit-event-section" class="hidden">
                <h2>イベント編集</h2>
                <form id="edit-event-form">
                    <input type="hidden" id="edit-event-id">
                    <div class="form-group">
                        <label for="edit-event-title">イベント名 <span class="required">*</span></label>
                        <input type="text" id="edit-event-title" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-event-description">説明</label>
                        <textarea id="edit-event-description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>日程候補 <span class="required">*</span></label>
                        <div id="edit-date-candidates">
                        </div>
                        <button type="button" id="edit-add-date-btn" class="btn btn-secondary">日程を追加</button>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">更新</button>
                        <button type="button" id="cancel-edit-btn" class="btn btn-secondary">キャンセル</button>
                    </div>
                </form>
            </section>
        </main>

        <!-- パスワード入力モーダル -->
        <div id="password-modal" class="modal hidden">
            <div class="modal-content">
                <h3>管理者認証</h3>
                <form id="password-form">
                    <div class="form-group">
                        <label for="admin-password">パスワードを入力してください</label>
                        <input type="password" id="admin-password" required autocomplete="off">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">ログイン</button>
                        <button type="button" id="cancel-password-btn" class="btn btn-secondary">キャンセル</button>
                    </div>
                </form>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 イベント日程調整ツール</p>
        </footer>
    </div>

    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
    </div>

    <div id="message" class="message hidden"></div>

    <script src="app.js"></script>
</body>
</html>
